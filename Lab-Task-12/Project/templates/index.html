<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Medical Insurance Estimator</h2>
        <form id="prediction-form">
            <input type="number" name="age" placeholder="Age" required>
            
            <select name="sex" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <input type="number" step="0.1" name="bmi" placeholder="BMI (e.g. 24.5)" required>
            <input type="number" name="children" placeholder="Number of Children" required>

            <select name="smoker" required>
                <option value="" disabled selected>Do you smoke?</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>

            <select name="region" required>
                <option value="" disabled selected>Region</option>
                <option value="southwest">Southwest</option>
                <option value="southeast">Southeast</option>
                <option value="northwest">Northwest</option>
                <option value="northeast">Northeast</option>
            </select>

            <button type="submit">Calculate Estimated Cost</button>
        </form>

        <div id="result-container" class="hidden">
            <h3>Estimated Charges:</h3>
            <p id="result-value">$0.00</p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
